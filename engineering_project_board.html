<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENGINEERING PROJECT BOARD</title>
<style>
body{margin:0;background:#07111f;color:white;font-family:Arial,sans-serif}
.header{display:flex;justify-content:space-between;padding:20px;background:#000;border-bottom:2px solid #f5c542}
.title{font-size:42px;color:#f5c542;font-weight:bold}
.subtitle{font-size:24px}
#clock{font-size:34px;color:#f5c542}
table{width:100%;border-collapse:collapse}
th,td{padding:16px;border:1px solid #223;text-align:center}
th{background:#0d1b2a;color:#f5c542}
tr:nth-child(even){background:#0f2238}
.status-green{color:#3ddb67;font-weight:bold}
.status-yellow{color:#ffd43b;font-weight:bold}
.status-red{color:#ff4d4d;font-weight:bold}
.scroll{height:75vh;overflow:hidden}
tbody{animation: scroll 20s linear infinite}
@keyframes scroll {0%{transform:translateY(0)}100%{transform:translateY(-40%)}}
.footer{padding:10px;background:#000;color:#f5c542}
</style>
</head>
<body>
<div class="header"><div><div class="title">ENGINEERING PROJECT BOARD</div><div class="subtitle">جدول أعمال المشروع</div></div><div id="clock"></div></div>
<div class="scroll"><table><thead><tr><th>الوقت</th><th>المهمة</th><th>المسؤول</th><th>الحالة</th><th>الموقع</th></tr></thead>
<tbody>
<tr><td>08:00</td><td>اجتماع المشروع</td><td>أحمد</td><td class="status-green">ON TIME</td><td>المكتب</td></tr>
<tr><td>10:00</td><td>مراجعة المخططات</td><td>خالد</td><td class="status-yellow">IN PROGRESS</td><td>الموقع</td></tr>
<tr><td>13:00</td><td>توريد المواد</td><td>سعيد</td><td class="status-red">DELAYED</td><td>المستودع</td></tr>
<tr><td>15:00</td><td>فحص الجودة</td><td>المهندس</td><td class="status-green">ON TIME</td><td>الموقع</td></tr>
</tbody></table></div>
<div class="footer">Airport Style Display</div>
<script>
function updateClock(){const n=new Date();document.getElementById('clock').innerHTML=n.toLocaleDateString()+'<br>'+n.toLocaleTimeString();}
setInterval(updateClock,1000);updateClock();
</script></body></html>
